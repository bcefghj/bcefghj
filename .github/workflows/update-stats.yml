name: 📊 Hourly GitHub Stats Update

on:
  schedule:
    # 每小时运行一次（每天24次，免费额度友好）
    - cron: "0 * * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    name: Update README Stats

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📊 Run Stats Updater
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python update_stats.py

      - name: 📝 Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md stats.json
          git diff --staged --quiet || git commit -m "📊 Hourly stats update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
